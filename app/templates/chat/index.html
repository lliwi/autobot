{% extends "base.html" %}

{% block title %}Chat - Autobot{% endblock %}

{% block content %}
<div class="chat-container">
    <div class="chat-header">
        <h1>Chat</h1>
        <select id="agent-select">
            <option value="">Select an agent...</option>
            {% for agent in agents %}
            <option value="{{ agent.id }}">{{ agent.name }}</option>
            {% endfor %}
        </select>
        <button type="button" id="new-chat-btn" class="btn btn-sm" disabled title="Start a new session with this agent">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right:4px">
                <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
            New chat
        </button>
        <label class="chat-toggle">
            <input type="checkbox" id="hide-tool-toggle">
            <span>Hide tool activity</span>
        </label>
    </div>

    <div id="messages" class="chat-messages">
        <p class="empty-state">Select an agent and start chatting.</p>
    </div>

    <div class="chat-input">
        <div id="attach-badge" class="attach-badge" hidden>
            <svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 9.5l-6 6a4.24 4.24 0 01-6-6L8 3.5A2.83 2.83 0 0112 7.5l-5.5 5.5A1.41 1.41 0 014.5 11L10 5.5"/></svg>
            <span id="attach-badge-name"></span>
            <button type="button" id="attach-remove" class="attach-remove" title="Remove attachment">×</button>
        </div>
        <form id="chat-form">
            <input type="file" id="file-input" style="display:none" accept=".txt,.md,.py,.js,.ts,.jsx,.tsx,.json,.yaml,.yml,.csv,.html,.xml,.sh,.bash,.css,.scss,.sql,.toml,.ini,.cfg,.conf,.log,.rst,.tex,.c,.cpp,.h,.java,.go,.rs,.rb,.php,.swift,.kt">
            <button type="button" id="attach-btn" class="btn attach-btn" title="Attach a text file" disabled>
                <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 9.5l-6 6a4.24 4.24 0 01-6-6L8 3.5A2.83 2.83 0 0112 7.5l-5.5 5.5A1.41 1.41 0 014.5 11L10 5.5"/></svg>
            </button>
            <textarea id="message-input" placeholder="Type a message..." rows="2" disabled></textarea>
            <button type="submit" id="send-btn" class="btn btn-primary" disabled>Send</button>
            <button type="button" id="stop-btn" class="btn btn-danger" hidden>Stop</button>
        </form>
        <div id="context-meter" class="context-meter" data-state="idle" hidden>
            <div class="context-meter-bar"><span class="context-meter-fill"></span></div>
            <div class="context-meter-label">
                Context <strong id="context-meter-pct">–</strong>
                <span class="context-meter-detail" id="context-meter-detail"></span>
            </div>
        </div>
    </div>
</div>

<script src="{{ url_for('static', filename='vendor/marked.min.js') }}"></script>
<script src="{{ url_for('static', filename='vendor/purify.min.js') }}"></script>
<script src="{{ url_for('static', filename='js/chat.js') }}"></script>
{% endblock %}
