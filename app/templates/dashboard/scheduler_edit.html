{% extends "base.html" %}

{% block title %}Edit Scheduled Task - Autobot{% endblock %}

{% block content %}
<div class="page-header">
    <h1>Edit Scheduled Task</h1>
</div>

<form method="POST" class="form-card">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div class="form-group">
        <label for="name">Name</label>
        <input type="text" id="name" name="name" value="{{ task.name or '' }}" placeholder="e.g. Daily digest, Sync Notion…">
        <small>Optional — makes the task easier to identify in the list.</small>
    </div>
    <div class="form-group">
        <label for="agent_id">Agent</label>
        <select id="agent_id" name="agent_id" required>
            <option value="">Select an agent</option>
            {% for agent in agents %}
            <option value="{{ agent.id }}" {% if agent.id == task.agent_id %}selected{% endif %}>{{ agent.name }}</option>
            {% endfor %}
        </select>
    </div>
    <div class="form-group">
        <label for="task_type">Task Type</label>
        <select id="task_type" name="task_type" required>
            <option value="cron" {% if task.task_type == 'cron' %}selected{% endif %}>Cron</option>
            <option value="heartbeat" {% if task.task_type == 'heartbeat' %}selected{% endif %}>Heartbeat</option>
            <option value="one_shot" {% if task.task_type == 'one_shot' %}selected{% endif %}>One Shot</option>
        </select>
    </div>
    <div class="form-group">
        <label for="schedule_expr">Cron Expression</label>
        <input type="text" id="schedule_expr" name="schedule_expr" value="{{ task.schedule_expr or '' }}" placeholder="*/15 * * * *">
        <small>Required for cron tasks. E.g. <code>*/15 * * * *</code> (every 15 min), <code>0 9 * * 1-5</code> (weekdays at 9am)</small>
    </div>
    <div class="form-group">
        <label for="timezone">Timezone</label>
        <input type="text" id="timezone" name="timezone" value="{{ task.timezone }}" placeholder="UTC">
    </div>
    <div class="form-group">
        <label for="payload_message">Payload Message</label>
        <textarea id="payload_message" name="payload_message" rows="3" placeholder="Message to send to the agent...">{{ (task.payload_json or {}).get('message', '') }}</textarea>
    </div>
    <div class="form-group">
        <label for="max_retries">Max Retries</label>
        <input type="number" id="max_retries" name="max_retries" value="{{ task.max_retries }}" min="0" max="10">
    </div>
    <div class="form-actions">
        <button type="submit" class="btn btn-primary">Save</button>
        <a href="{{ url_for('dashboard.scheduler_list') }}" class="btn">Cancel</a>
    </div>
</form>
{% endblock %}
