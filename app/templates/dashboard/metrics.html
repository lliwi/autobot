{% extends "base.html" %}

{% block title %}Metrics - Autobot{% endblock %}

{% block content %}
<div class="page-header">
    <h1>Metrics</h1>
    <div>
        <select id="days-select" class="btn">
            <option value="7">Last 7 days</option>
            <option value="30" selected>Last 30 days</option>
            <option value="90">Last 90 days</option>
        </select>
    </div>
</div>

<div class="card codex-quota-card" id="codex-quota-card">
    <div class="codex-quota-header">
        <h3>Codex subscription consumption</h3>
        <small id="codex-quota-meta">Loading…</small>
    </div>
    <div class="codex-quota-bars" id="codex-quota-bars"></div>
</div>

<div class="metrics-grid">
    <div class="card">
        <h3>Runs per Day</h3>
        <canvas id="chart-runs"></canvas>
    </div>
    <div class="card">
        <h3>Avg Response Time (ms)</h3>
        <canvas id="chart-response"></canvas>
    </div>
    <div class="card">
        <h3>Errors per Day</h3>
        <canvas id="chart-errors"></canvas>
    </div>
    <div class="card">
        <h3>Usage by Agent</h3>
        <canvas id="chart-agents"></canvas>
    </div>
    <div class="card">
        <h3>Usage by Channel</h3>
        <canvas id="chart-channels"></canvas>
    </div>
    <div class="card">
        <h3>Tool Executions</h3>
        <canvas id="chart-tools"></canvas>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<script>
const COLORS = ['#4f46e5', '#06b6d4', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6', '#ec4899', '#14b8a6'];

function fetchJson(url) {
    return fetch(url, {credentials: 'same-origin'}).then(r => r.json());
}

function lineChart(canvasId, labels, data, label, color) {
    new Chart(document.getElementById(canvasId), {
        type: 'line',
        data: {
            labels: labels,
            datasets: [{label, data, borderColor: color, backgroundColor: color + '33', fill: true, tension: 0.3}]
        },
        options: {responsive: true, plugins: {legend: {display: false}}, scales: {y: {beginAtZero: true}}}
    });
}

function barChart(canvasId, labels, data, label, colors) {
    new Chart(document.getElementById(canvasId), {
        type: 'bar',
        data: {
            labels: labels,
            datasets: [{label, data, backgroundColor: colors || COLORS.slice(0, labels.length)}]
        },
        options: {responsive: true, plugins: {legend: {display: false}}, scales: {y: {beginAtZero: true}}}
    });
}

function loadCharts(days) {
    // Clear existing charts
    Chart.helpers.each(Chart.instances, c => c.destroy());

    fetchJson(`/api/metrics/runs-per-day?days=${days}`).then(d => {
        lineChart('chart-runs', d.map(r => r.day), d.map(r => r.count), 'Runs', '#4f46e5');
    });

    fetchJson(`/api/metrics/response-times?days=${days}`).then(d => {
        lineChart('chart-response', d.map(r => r.day), d.map(r => r.avg_ms), 'Avg ms', '#06b6d4');
    });

    fetchJson(`/api/metrics/errors?days=${days}`).then(d => {
        lineChart('chart-errors', d.map(r => r.day), d.map(r => r.count), 'Errors', '#ef4444');
    });

    fetchJson(`/api/metrics/usage-by-agent?days=${days}`).then(d => {
        barChart('chart-agents', d.map(r => r.agent_name), d.map(r => r.runs), 'Runs');
    });

    fetchJson(`/api/metrics/usage-by-channel?days=${days}`).then(d => {
        barChart('chart-channels', d.map(r => r.channel), d.map(r => r.runs), 'Runs');
    });

    fetchJson(`/api/metrics/usage-by-tool?days=${days}`).then(d => {
        new Chart(document.getElementById('chart-tools'), {
            type: 'pie',
            data: {
                labels: d.map(r => r.tool_name),
                datasets: [{
                    data: d.map(r => r.count),
                    backgroundColor: COLORS.slice(0, d.length),
                    borderWidth: 1,
                }]
            },
            options: {
                responsive: true,
                plugins: {
                    legend: { position: 'right', labels: { boxWidth: 12, font: { size: 11 } } },
                    tooltip: {
                        callbacks: {
                            label: ctx => {
                                const total = ctx.dataset.data.reduce((a, b) => a + b, 0);
                                const pct = total ? ((ctx.parsed / total) * 100).toFixed(1) : 0;
                                return ` ${ctx.label}: ${ctx.parsed} (${pct}%)`;
                            }
                        }
                    }
                }
            }
        });
    });
}

function formatWindow(minutes) {
    if (!minutes) return '';
    if (minutes >= 1440 && minutes % 1440 === 0) {
        const d = minutes / 1440;
        return d === 1 ? '1-day window' : `${d}-day window`;
    }
    if (minutes >= 60 && minutes % 60 === 0) {
        const h = minutes / 60;
        return h === 1 ? '1-hour window' : `${h}-hour window`;
    }
    return `${minutes}-min window`;
}

function formatReset(iso) {
    if (!iso) return '';
    const d = new Date(iso);
    if (isNaN(d.getTime())) return '';
    const diffMs = d.getTime() - Date.now();
    if (diffMs <= 0) return 'resets soon';
    const mins = Math.round(diffMs / 60000);
    if (mins < 60) return `resets in ${mins}m`;
    const hours = Math.floor(mins / 60);
    const rest = mins % 60;
    if (hours < 48) return `resets in ${hours}h ${rest}m`;
    const days = Math.floor(hours / 24);
    return `resets in ${days}d ${hours % 24}h`;
}

function barColor(used) {
    if (used >= 90) return '#ef4444';
    if (used >= 70) return '#f59e0b';
    return '#10b981';
}

function renderQuotaBar(window, data) {
    if (data == null || data.used == null) {
        return `<div class="quota-row quota-empty"><span class="quota-label">${window}</span><span>no data yet</span></div>`;
    }
    const used = data.used;
    const remaining = data.remaining;
    const color = barColor(used);
    const windowLabel = formatWindow(data.window_minutes);
    const reset = formatReset(data.resets_at);
    return `
        <div class="quota-row">
            <div class="quota-row-head">
                <span class="quota-label">${window}${windowLabel ? ` · ${windowLabel}` : ''}</span>
                <span class="quota-remaining"><strong>${remaining.toFixed(1)}%</strong> remaining</span>
            </div>
            <div class="quota-bar">
                <div class="quota-bar-fill" style="width: ${used}%; background: ${color};"></div>
            </div>
            <div class="quota-row-foot">
                <span>${used.toFixed(1)}% used</span>
                <span>${reset}</span>
            </div>
        </div>
    `;
}

function loadCodexQuota() {
    fetchJson('/api/metrics/codex-quota').then(d => {
        const meta = document.getElementById('codex-quota-meta');
        const bars = document.getElementById('codex-quota-bars');
        if (!d.available) {
            meta.textContent = 'No quota snapshot yet — send a message to any agent to populate this.';
            bars.innerHTML = '';
            return;
        }
        const plan = d.plan_type ? `plan: <code>${d.plan_type}</code>` : '';
        const fetched = d.fetched_at ? `updated ${new Date(d.fetched_at).toLocaleString()}` : '';
        meta.innerHTML = [plan, fetched].filter(Boolean).join(' · ');
        bars.innerHTML = renderQuotaBar('Short window', d.primary) + renderQuotaBar('Weekly window', d.secondary);
    }).catch(() => {
        document.getElementById('codex-quota-meta').textContent = 'Failed to load.';
    });
}

document.getElementById('days-select').addEventListener('change', e => loadCharts(e.target.value));
loadCharts(30);
loadCodexQuota();
</script>

<style>
.metrics-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(min(400px, 100%), 1fr));
    gap: 1.5rem;
    margin-top: 1rem;
}
.metrics-grid .card {
    background: transparent;
    border: 1px solid var(--border, #e5e7eb);
    border-radius: 8px;
    padding: 1.25rem;
}
.metrics-grid .card h3 {
    margin: 0 0 0.75rem;
    font-size: 0.95rem;
    color: var(--text-secondary, #6b7280);
}
.codex-quota-card {
    background: transparent;
    border: 1px solid var(--border, #e5e7eb);
    border-radius: 8px;
    padding: 1.25rem;
    margin-top: 1rem;
}
.codex-quota-header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 1rem;
    margin-bottom: 1rem;
}
.codex-quota-header h3 {
    margin: 0;
    font-size: 0.95rem;
    color: var(--text-secondary, #6b7280);
}
.codex-quota-bars {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(min(280px, 100%), 1fr));
    gap: 1.25rem;
}
.quota-row-head, .quota-row-foot {
    display: flex;
    justify-content: space-between;
    font-size: 0.85rem;
}
.quota-row-head { margin-bottom: 0.35rem; }
.quota-row-foot {
    margin-top: 0.35rem;
    color: var(--text-secondary, #6b7280);
}
.quota-remaining strong {
    font-size: 1rem;
}
.quota-bar {
    height: 10px;
    background: rgba(107, 114, 128, 0.2);
    border-radius: 6px;
    overflow: hidden;
}
.quota-bar-fill {
    height: 100%;
    border-radius: 6px;
    transition: width 0.4s ease;
}
.quota-empty {
    color: var(--text-secondary, #6b7280);
    font-size: 0.85rem;
}
</style>
{% endblock %}
