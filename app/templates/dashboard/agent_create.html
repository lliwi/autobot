{% extends "base.html" %}

{% block title %}Create Agent - Autobot{% endblock %}

{% block content %}
<div class="page-header">
    <h1>Create Agent</h1>
</div>

<form method="POST" class="form-card">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div class="form-group">
        <label for="name">Name</label>
        <input type="text" id="name" name="name" required placeholder="My Agent">
    </div>
    <div class="form-group">
        <label for="model_name">Model</label>
        <input type="text" id="model_name" name="model_name" value="o4-mini" placeholder="o4-mini">
    </div>
    <div class="form-actions">
        <button type="submit" class="btn btn-primary">Create</button>
        <a href="{{ url_for('dashboard.agents_list') }}" class="btn">Cancel</a>
    </div>
</form>
{% endblock %}
