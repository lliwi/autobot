services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "5000:5000"
      - "1455:1455"
    volumes:
      - .:/app
      - codex_auth:/root/.local/share/oauth-cli-kit
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
      - kali

  worker:
    build:
      context: .
      dockerfile: Dockerfile.dev
    volumes:
      - .:/app
      - codex_auth:/root/.local/share/oauth-cli-kit
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
      - kali
    command: ["python", "worker.py"]
    restart: unless-stopped

  kali:
    build:
      context: .
      dockerfile: Dockerfile.kali
    restart: unless-stopped
    env_file:
      - .env
    # No ports: mapping — only reachable inside Docker bridge by service name kali:8000
    cap_add:
      - NET_RAW    # nmap SYN scans, raw packet capture
      - NET_ADMIN  # interface/routing changes needed by some pentest tools

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: autobot
      POSTGRES_PASSWORD: autobot
      POSTGRES_DB: autobot
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata:
  codex_auth:
