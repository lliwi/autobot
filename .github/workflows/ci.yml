name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref to save runner minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: lint + tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check .

      - name: Run tests
        # The suite runs entirely on SQLite in-memory (see tests/conftest.py),
        # so no Postgres/Redis services are required.
        # conftest.py generates an ephemeral TOKEN_ENCRYPTION_KEY when none is
        # provided, so credential tests are self-contained here.
        env:
          FLASK_ENV: testing
          DATABASE_URL: "sqlite:///:memory:"
        run: pytest -q
